<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>作战地图 // OPERATION MAP</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+QingKe+HuangYou&family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&family=Noto+Sans+SC:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --eva-purple:#7B2D8E;--eva-purple-light:#A855F7;--eva-purple-dark:#3D1A4A;
  --eva-green:#44D62C;--eva-green-dim:#2CA01E;--eva-green-glow:#6AFF50;
  --eva-orange:#FF6A00;--eva-black:#0A0412;--eva-white:#E8DCF5;
  --glass:rgba(10,4,18,0.55);--glass-border:rgba(123,45,142,0.18);
  --font-title:'Ma Shan Zheng',cursive;
  --font-cn:'ZCOOL QingKe HuangYou',sans-serif;
  --font-tech:'Chakra Petch',sans-serif;
  --font-mono:'Share Tech Mono',monospace;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--eva-black);color:var(--eva-white);font-family:'Noto Sans SC',sans-serif;height:100vh;overflow:hidden;cursor:none;}

/* custom cursor */
.cursor-glow{
  position:fixed;width:200px;height:200px;border-radius:50%;pointer-events:none;z-index:9999;
  background:radial-gradient(circle,rgba(68,214,44,0.06) 0%,rgba(123,45,142,0.03) 40%,transparent 70%);
  transform:translate(-50%,-50%);transition:opacity 0.3s;
  mix-blend-mode:screen;
}
.cursor-dot{
  position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:10000;
  background:var(--eva-green);box-shadow:0 0 10px var(--eva-green);
  transform:translate(-50%,-50%);transition:transform 0.15s var(--ease-spring);
}
.cursor-dot.hovering{transform:translate(-50%,-50%) scale(2.5);background:var(--eva-purple-light);box-shadow:0 0 16px var(--eva-purple-light);}

#map{position:absolute;inset:0;z-index:1;cursor:none!important;}
.leaflet-grab{cursor:none!important;}
.leaflet-dragging .leaflet-grab{cursor:none!important;}
.leaflet-tile-pane{filter:saturate(0.12) brightness(0.3) contrast(1.4) hue-rotate(260deg);}
.leaflet-control-zoom{display:none!important;}
.leaflet-control-attribution{background:transparent!important;color:rgba(123,45,142,0.15)!important;font-size:8px!important;}
.leaflet-control-attribution a{color:rgba(123,45,142,0.2)!important;}
.leaflet-popup{display:none!important;}

/* scan lines */
.scanlines{position:fixed;inset:0;z-index:998;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(10,4,18,0.04) 3px,rgba(10,4,18,0.04) 4px);opacity:0.7;}

/* EVA stripes */
.eva-stripe{position:fixed;left:0;right:0;height:2px;z-index:1001;
  background:repeating-linear-gradient(90deg,var(--eva-purple) 0,var(--eva-purple) 16px,var(--eva-green) 16px,var(--eva-green) 32px);opacity:0.5;}
.eva-stripe.top{top:0;}.eva-stripe.bot{bottom:0;}

/* corner brackets */
.bracket{position:fixed;z-index:1000;pointer-events:none;opacity:0;animation:bracketIn 1s var(--ease-out-expo) forwards;}
.bracket svg{width:50px;height:50px;}
.bracket.tl{top:6px;left:6px;animation-delay:0.8s;}
.bracket.tr{top:6px;right:6px;transform:scaleX(-1);animation-delay:0.9s;}
.bracket.bl{bottom:6px;left:6px;transform:scaleY(-1);animation-delay:1s;}
.bracket.br{bottom:6px;right:6px;transform:scale(-1,-1);animation-delay:1.1s;}
@keyframes bracketIn{to{opacity:1;}}

/* ─── NAV BAR (top center, Apple pill style) ─── */
.nav-bar{
  position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:1000;
  display:flex;align-items:center;gap:3px;
  background:var(--glass);backdrop-filter:blur(40px) saturate(1.4);
  -webkit-backdrop-filter:blur(40px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:40px;
  padding:4px 6px;
  opacity:0;animation:slideDown 0.8s 0.3s var(--ease-out-expo) forwards;
}
@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
.nav-bar a,.nav-bar button{
  font-family:var(--font-tech);font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  color:rgba(232,220,245,0.4);text-decoration:none;
  padding:8px 18px;border:none;cursor:none;
  background:transparent;border-radius:30px;
  transition:all 0.5s var(--ease-out-expo);
  position:relative;overflow:hidden;
}
.nav-bar a::after,.nav-bar button::after{
  content:'';position:absolute;inset:0;border-radius:30px;opacity:0;
  background:linear-gradient(135deg,rgba(68,214,44,0.1),rgba(123,45,142,0.08));
  transition:opacity 0.4s;
}
.nav-bar a:hover,.nav-bar button:hover{color:var(--eva-green);}
.nav-bar a:hover::after,.nav-bar button:hover::after{opacity:1;}
.nav-bar button.active{
  color:var(--eva-black);
  background:linear-gradient(135deg,var(--eva-green),#5AE040);
  box-shadow:0 0 24px rgba(68,214,44,0.25);
}
.nav-bar button.active:hover{transform:scale(1.04);}
.nav-bar .divider{width:1px;height:16px;background:rgba(123,45,142,0.2);margin:0 4px;flex-shrink:0;}

/* ─── HERO TITLE (bottom-left, cinematic) ─── */
.hero{
  position:fixed;bottom:30px;left:30px;z-index:1000;pointer-events:none;
  opacity:0;animation:heroIn 1.2s 0.5s var(--ease-out-expo) forwards;
}
@keyframes heroIn{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
.hero-label{
  font-family:var(--font-mono);font-size:9px;letter-spacing:6px;
  color:var(--eva-purple-light);opacity:0.4;margin-bottom:6px;
  display:flex;align-items:center;gap:8px;
}
.hero-label::before{content:'';width:20px;height:1px;background:var(--eva-purple-light);opacity:0.4;}
.hero h1{
  font-family:var(--font-title);font-size:52px;line-height:1;letter-spacing:4px;
  background:linear-gradient(180deg,var(--eva-green) 30%,var(--eva-green-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 30px rgba(68,214,44,0.2));
}
.hero h1 em{
  font-style:normal;
  background:linear-gradient(180deg,var(--eva-purple-light) 20%,var(--eva-purple) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(168,85,247,0.2));
}
.hero-sub{
  font-family:var(--font-tech);font-size:11px;font-weight:700;
  letter-spacing:8px;color:var(--eva-purple-light);opacity:0.25;margin-top:8px;
}

/* ─── HUD STATS (top-right) ─── */
.hud-stats{
  position:fixed;top:18px;right:30px;z-index:1000;
  display:flex;gap:16px;pointer-events:none;
  opacity:0;animation:fadeIn 1s 0.6s var(--ease-out-expo) forwards;
}
@keyframes fadeIn{to{opacity:1;}}
.hud-stat{text-align:center;}
.hud-stat-val{
  font-family:var(--font-mono);font-size:22px;font-weight:700;
  color:var(--eva-green);opacity:0.6;
  text-shadow:0 0 16px rgba(68,214,44,0.2);
}
.hud-stat-label{
  font-family:var(--font-mono);font-size:8px;letter-spacing:3px;
  color:var(--eva-purple-light);opacity:0.3;margin-top:2px;
}

/* ─── DETAIL PANEL (slide from right, Apple style) ─── */
.detail-panel{
  position:fixed;top:0;right:0;bottom:0;width:380px;z-index:1002;
  background:var(--glass);backdrop-filter:blur(60px) saturate(1.6);
  -webkit-backdrop-filter:blur(60px) saturate(1.6);
  border-left:1px solid var(--glass-border);
  transform:translateX(100%);transition:transform 0.6s var(--ease-out-expo);
  display:flex;flex-direction:column;overflow:hidden;
}
.detail-panel.open{transform:translateX(0);}
.detail-panel .stripe{height:2px;flex-shrink:0;
  background:repeating-linear-gradient(90deg,var(--eva-purple) 0,var(--eva-purple) 12px,var(--eva-green) 12px,var(--eva-green) 24px);opacity:0.6;}
.detail-close{
  position:absolute;top:16px;right:16px;width:36px;height:36px;
  border:1px solid rgba(123,45,142,0.2);border-radius:50%;
  background:rgba(10,4,18,0.4);backdrop-filter:blur(20px);
  display:flex;align-items:center;justify-content:center;
  cursor:none;transition:all 0.4s var(--ease-spring);z-index:2;
}
.detail-close:hover{border-color:var(--eva-green);transform:scale(1.1) rotate(90deg);background:rgba(68,214,44,0.08);}
.detail-close svg{width:14px;height:14px;}
.detail-body{padding:50px 32px 32px;flex:1;overflow-y:auto;}
.detail-body::-webkit-scrollbar{width:2px;}
.detail-body::-webkit-scrollbar-thumb{background:var(--eva-purple);border-radius:2px;}

.detail-idx{
  font-family:var(--font-mono);font-size:64px;font-weight:700;
  color:var(--eva-green);opacity:0.08;line-height:1;margin-bottom:-20px;
}
.detail-name{
  font-family:var(--font-title);font-size:34px;letter-spacing:4px;
  color:var(--eva-green);line-height:1.2;margin-bottom:8px;
  text-shadow:0 0 20px rgba(68,214,44,0.15);
}
.detail-tag{
  font-family:var(--font-mono);font-size:9px;letter-spacing:4px;
  text-transform:uppercase;display:inline-block;
  padding:4px 14px;margin-bottom:20px;
  color:var(--eva-purple-light);
  border:1px solid rgba(123,45,142,0.25);
  background:rgba(123,45,142,0.06);
  border-radius:20px;
}
.detail-divider{
  height:1px;margin:0 0 20px;
  background:linear-gradient(90deg,var(--eva-green),var(--eva-purple),transparent);opacity:0.2;
}
.detail-desc{
  font-family:'Noto Sans SC',sans-serif;font-weight:300;
  font-size:14px;line-height:2;color:rgba(232,220,245,0.5);
  letter-spacing:0.5px;
}
.detail-coords{
  margin-top:24px;padding:14px 18px;
  background:rgba(68,214,44,0.03);border:1px solid rgba(68,214,44,0.08);
  border-radius:12px;
}
.detail-coords-label{
  font-family:var(--font-mono);font-size:8px;letter-spacing:3px;
  color:var(--eva-green);opacity:0.4;margin-bottom:6px;
}
.detail-coords-val{
  font-family:var(--font-mono);font-size:13px;letter-spacing:2px;
  color:var(--eva-green);opacity:0.6;
}

/* ─── LEGEND (bottom-right, glass pill) ─── */
.legend{
  position:fixed;bottom:30px;right:30px;z-index:1000;
  background:var(--glass);backdrop-filter:blur(40px) saturate(1.4);
  -webkit-backdrop-filter:blur(40px) saturate(1.4);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:16px 20px;
  opacity:0;animation:slideUp 0.8s 0.7s var(--ease-out-expo) forwards;
  transition:transform 0.5s var(--ease-spring),opacity 0.4s;
}
.legend:hover{transform:translateY(-4px);}
.legend.panel-open{opacity:0!important;pointer-events:none;transform:translateX(40px);}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.legend-head{
  font-family:var(--font-tech);font-size:8px;font-weight:700;
  letter-spacing:4px;color:var(--eva-green);margin-bottom:10px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.legend-head::after{content:'';flex:1;height:1px;background:rgba(68,214,44,0.15);}
.legend-item{
  display:flex;align-items:center;gap:10px;padding:3px 0;
  font-family:var(--font-mono);font-size:10px;letter-spacing:1px;color:rgba(232,220,245,0.35);
  transition:color 0.3s;cursor:none;
}
.legend-item:hover{color:var(--eva-white);}
.legend-dot{width:8px;height:8px;flex-shrink:0;transition:transform 0.3s var(--ease-spring);}
.legend-item:hover .legend-dot{transform:scale(1.5);}
.legend-dot.circle{border-radius:50%;}
.legend-dot.diamond{transform:rotate(45deg);border-radius:1px;}
.legend-item:hover .legend-dot.diamond{transform:rotate(45deg) scale(1.5);}
.legend-dot.square{border-radius:0;}

/* ─── LOADING SEQUENCE ─── */
.loading-overlay{
  position:fixed;inset:0;z-index:10000;background:var(--eva-black);
  display:flex;align-items:center;justify-content:center;flex-direction:column;
  animation:loadOut 0.6s 2.2s var(--ease-out-expo) forwards;
}
@keyframes loadOut{to{opacity:0;pointer-events:none;}}
.load-text{
  font-family:var(--font-title);font-size:36px;color:var(--eva-green);
  opacity:0;animation:loadPulse 0.6s 0.3s forwards;letter-spacing:8px;
}
@keyframes loadPulse{0%{opacity:0;transform:scale(0.9);}50%{opacity:1;}100%{opacity:0.8;transform:scale(1);}}
.load-bar{
  width:200px;height:2px;background:rgba(123,45,142,0.2);margin-top:20px;border-radius:2px;overflow:hidden;
}
.load-bar-inner{
  height:100%;width:0;background:linear-gradient(90deg,var(--eva-purple),var(--eva-green));
  animation:loadBar 1.8s 0.4s var(--ease-out-expo) forwards;border-radius:2px;
}
@keyframes loadBar{to{width:100%;}}
.load-sub{
  font-family:var(--font-mono);font-size:9px;letter-spacing:5px;
  color:var(--eva-purple-light);opacity:0;margin-top:12px;
  animation:fadeIn 0.4s 1.2s forwards;
}

/* pulse ring for home */
@keyframes pulse-ring{0%{transform:scale(1);opacity:0.5;}100%{transform:scale(3);opacity:0;}}
@keyframes markerFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}

/* responsive */
@media(max-width:600px){
  .detail-panel{width:100%;border-left:none;border-top:1px solid var(--glass-border);}
  .hero h1{font-size:32px;}
  .nav-bar{top:10px;gap:1px;padding:3px 4px;}
  .nav-bar a,.nav-bar button{padding:6px 10px;font-size:9px;letter-spacing:1px;}
  .hud-stats{display:none;}
}
</style>
</head>
<body>

<!-- Loading sequence -->
<div class="loading-overlay">
  <div class="load-text">作战地图</div>
  <div class="load-bar"><div class="load-bar-inner"></div></div>
  <div class="load-sub">INITIALIZING TACTICAL OVERLAY</div>
</div>

<div class="scanlines"></div>
<div class="eva-stripe top"></div>
<div class="eva-stripe bot"></div>

<div class="bracket tl"><svg viewBox="0 0 50 50"><path d="M2,18 L2,2 L18,2" fill="none" stroke="var(--eva-green)" stroke-width="1.2" opacity="0.35"/></svg></div>
<div class="bracket tr"><svg viewBox="0 0 50 50"><path d="M2,18 L2,2 L18,2" fill="none" stroke="var(--eva-green)" stroke-width="1.2" opacity="0.35"/></svg></div>
<div class="bracket bl"><svg viewBox="0 0 50 50"><path d="M2,18 L2,2 L18,2" fill="none" stroke="var(--eva-purple)" stroke-width="1.2" opacity="0.35"/></svg></div>
<div class="bracket br"><svg viewBox="0 0 50 50"><path d="M2,18 L2,2 L18,2" fill="none" stroke="var(--eva-purple)" stroke-width="1.2" opacity="0.35"/></svg></div>

<!-- Cursor -->
<div class="cursor-glow" id="cursorGlow"></div>
<div class="cursor-dot" id="cursorDot"></div>

<div id="map"></div>

<!-- Nav -->
<nav class="nav-bar" id="navBar">
  <a href="index.html">公约</a>
  <a href="extras.html">惩罚</a>
  <a href="timeline.html">行程</a>
  <a href="achievements.html">成就</a>
  <div class="divider"></div>
  <button class="active" onclick="flyTo('all')">全域</button>
  <button onclick="flyTo('city')">城区</button>
  <button onclick="flyTo('nanshan')">南山</button>
  <button onclick="flyTo('fuling')">涪陵</button>
</nav>

<!-- HUD stats -->
<div class="hud-stats">
  <div class="hud-stat"><div class="hud-stat-val" data-count="33">0</div><div class="hud-stat-label">TARGETS</div></div>
  <div class="hud-stat"><div class="hud-stat-val" data-count="6">0</div><div class="hud-stat-label">SECTORS</div></div>
  <div class="hud-stat"><div class="hud-stat-val" data-count="4">0</div><div class="hud-stat-label">DAYS</div></div>
</div>

<!-- Hero title -->
<div class="hero">
  <div class="hero-label">NERV OPERATION MAP</div>
  <h1>重庆<em>作战</em>地图</h1>
  <div class="hero-sub">CHONGQING TACTICAL OVERLAY</div>
</div>

<!-- Legend -->
<div class="legend" id="legend">
  <div class="legend-head">TERRAIN</div>
  <div class="legend-item"><div class="legend-dot" style="width:20px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--eva-purple),var(--eva-purple-light));opacity:0.5;"></div>长江 / 嘉陵江</div>
  <div class="legend-item"><div class="legend-dot square" style="background:rgba(68,214,44,0.15);border:1px dashed rgba(68,214,44,0.3);"></div>渝中 / 南岸</div>
  <div class="legend-item"><div class="legend-dot square" style="background:rgba(123,45,142,0.1);border:1px dashed rgba(123,45,142,0.3);"></div>江北 / 九龙坡 / 沙坪坝</div>
  <div class="legend-head" style="margin-top:10px;">TARGETS</div>
  <div class="legend-item"><div class="legend-dot circle" style="background:var(--eva-purple-light);box-shadow:0 0 6px var(--eva-purple);"></div>作战基地</div>
  <div class="legend-item"><div class="legend-dot circle" style="background:var(--eva-green);box-shadow:0 0 5px rgba(68,214,44,0.3);"></div>南岸区</div>
  <div class="legend-item"><div class="legend-dot diamond" style="background:var(--eva-green-dim);box-shadow:0 0 5px rgba(44,160,30,0.3);"></div>渝中区</div>
  <div class="legend-item"><div class="legend-dot square" style="background:var(--eva-purple);box-shadow:0 0 5px rgba(123,45,142,0.3);"></div>外围区域</div>
  <div class="legend-item"><div class="legend-dot circle" style="background:var(--eva-green-glow);box-shadow:0 0 6px rgba(106,255,80,0.3);"></div>远郊目标</div>
  <div class="legend-item"><div class="legend-dot diamond" style="background:var(--eva-orange);box-shadow:0 0 5px rgba(255,106,0,0.2);"></div>补给站</div>
</div>

<!-- Detail Panel -->
<div class="detail-panel" id="detailPanel">
  <div class="stripe"></div>
  <div class="detail-close" id="detailClose" onclick="closePanel()">
    <svg viewBox="0 0 14 14"><line x1="1" y1="1" x2="13" y2="13" stroke="var(--eva-green)" stroke-width="1.5"/><line x1="13" y1="1" x2="1" y2="13" stroke="var(--eva-green)" stroke-width="1.5"/></svg>
  </div>
  <div class="detail-body">
    <div class="detail-idx" id="dIdx"></div>
    <div class="detail-name" id="dName"></div>
    <div class="detail-tag" id="dTag"></div>
    <div class="detail-divider"></div>
    <div class="detail-desc" id="dDesc"></div>
    <div class="detail-coords">
      <div class="detail-coords-label">COORDINATES</div>
      <div class="detail-coords-val" id="dCoords"></div>
    </div>
  </div>
  <div class="stripe"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
/* ─── CUSTOM CURSOR ─── */
const glow=document.getElementById('cursorGlow'),dot=document.getElementById('cursorDot');
let mx=0,my=0,gx=0,gy=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});
(function glowFollow(){gx+=(mx-gx)*0.08;gy+=(my-gy)*0.08;glow.style.left=gx+'px';glow.style.top=gy+'px';requestAnimationFrame(glowFollow);})();

document.addEventListener('mouseover',e=>{
  if(e.target.closest('a,button,.detail-close,.legend-item'))dot.classList.add('hovering');
  else dot.classList.remove('hovering');
});

/* ─── MAP ─── */
const map=L.map('map',{center:[29.558,106.570],zoom:13,zoomControl:false,attributionControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'&copy; OSM & CARTO',maxZoom:19}).addTo(map);

/* ─── RIVERS & TERRAIN ─── */
const RIVER_STYLE={color:'#7B2D8E',weight:6,opacity:0.18,lineCap:'round',lineJoin:'round'};
const RIVER_GLOW={color:'#A855F7',weight:14,opacity:0.06,lineCap:'round',lineJoin:'round'};
const RIVER_CORE={color:'#A855F7',weight:2,opacity:0.25,lineCap:'round',lineJoin:'round'};

const yangtze=[
  [29.490,106.38],[29.493,106.41],[29.495,106.43],[29.497,106.45],
  [29.498,106.47],[29.500,106.49],[29.503,106.505],[29.508,106.515],
  [29.515,106.525],[29.525,106.54],[29.535,106.55],[29.543,106.555],
  [29.548,106.56],[29.553,106.568],[29.556,106.575],[29.559,106.58],

const C={P:'#A855F7',G:'#44D62C',GD:'#2CA01E',GG:'#6AFF50',O:'#FF6A00',PD:'#7B2D8E'};

function mkIcon(color,size,shape){
  const br=shape==='diamond'?'2px':shape==='square'?'0':'50%';
  const tf=shape==='diamond'?'rotate(45deg)':'none';
  return L.divIcon({className:'',iconSize:[size,size],iconAnchor:[size/2,size/2],
    html:`<div style="width:${size}px;height:${size}px;position:relative;animation:markerFloat 3s ease-in-out infinite;animation-delay:${Math.random()*2}s;">
      <div style="position:absolute;inset:0;border-radius:${br};transform:${tf};
        background:${color};box-shadow:0 0 ${size*1.5}px ${color}80,0 0 ${size*3}px ${color}20;
        border:1.5px solid rgba(232,220,245,0.2);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      "></div></div>`});
}
function mkHome(){
  return L.divIcon({className:'',iconSize:[22,22],iconAnchor:[11,11],
    html:`<div style="position:relative;width:22px;height:22px;">
      <div style="position:absolute;inset:0;border-radius:50%;background:${C.P};
        box-shadow:0 0 20px ${C.P},0 0 40px ${C.P}40;border:2px solid rgba(232,220,245,0.35);z-index:2;"></div>
      <div style="position:absolute;inset:-10px;border-radius:50%;border:1.5px solid ${C.G};opacity:0.35;
        animation:pulse-ring 2.5s ease-out infinite;"></div>
      <div style="position:absolute;inset:-6px;border-radius:50%;border:1px solid ${C.P};opacity:0.2;
        animation:pulse-ring 2.5s 0.8s ease-out infinite;"></div></div>`});
}

/* ─── DETAIL PANEL ─── */
const panel=document.getElementById('detailPanel'),legend=document.getElementById('legend');
function openPanel(s,i){
  document.getElementById('dIdx').textContent=String(i+1).padStart(2,'0');
  document.getElementById('dName').textContent=s.name;
  document.getElementById('dTag').textContent=s.tag;
  document.getElementById('dDesc').textContent=s.desc;
  document.getElementById('dCoords').textContent=`${s.lat.toFixed(4)}°N  ${s.lng.toFixed(4)}°E`;
  panel.classList.add('open');
  legend.classList.add('panel-open');
}
function closePanel(){panel.classList.remove('open');legend.classList.remove('panel-open');}
map.on('click',e=>{if(!e.originalEvent.target.closest('.leaflet-marker-icon'))closePanel();});

function flyTo(key){
  const v=views[key];map.flyTo([v[0],v[1]],v[2],{duration:1.2,easeLinearity:0.25});
  document.querySelectorAll('.nav-bar button').forEach(b=>b.classList.toggle('active',b.textContent==={all:'全域',city:'城区',nanshan:'南山',fuling:'涪陵'}[key]));

}

/* ─── COUNTER ANIMATION ─── */
setTimeout(()=>{
  document.querySelectorAll('[data-count]').forEach(el=>{
    const target=+el.dataset.count;let cur=0;
    const step=()=>{cur+=Math.ceil(target/20);if(cur>=target){el.textContent=target;return;}el.textContent=cur;requestAnimationFrame(step);};
    step();
  });
},2400);
